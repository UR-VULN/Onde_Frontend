server {
    listen       80;
    server_name  localhost;
    server_tokens off;

    # 26.pdf Case 1 — Nginx/OpenResty Server 헤더 마스킹 (headers-more-nginx-module)
    more_clear_headers Server;
    more_set_headers 'Server: WebServer';
    more_set_headers -s '400 401 403 404 405 500 502 503 504' 'Server: WebServer';

    # 26.pdf Case 2 (엣지) — TRACE 등 위험 메소드는 업스트림(ALB) 전에 405 반환
    if ($request_method ~ ^(TRACE|TRACK|CONNECT|DEBUG)$) {
        return 405;
    }

    location = /robots.txt {
        root /usr/share/nginx/html;
        if ($host ~* ^rookies\.) {
            rewrite ^ /robots-private.txt break;
        }
        try_files /robots.txt =404;
        default_type text/plain;
        charset utf-8;
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /user-api/ {
        # ======================================================================
        # [ 개발 환경 스위칭 설정 ] 두 옵션 중 하나만 주석 해제하여 사용하세요.
        # ======================================================================

        # [방법 A] 로컬 개발 전용 (로컬 도커 API 컨테이너로 연결)
        proxy_pass http://api:8080/;

        # [방법 B] 원격 AWS 및 깃허브 제출용 (원격 AWS 개발 ALB로 연결)
        #proxy_pass https://onde-alb-207957013.ap-northeast-2.elb.amazonaws.com/;
        #proxy_ssl_server_name on;
        #proxy_ssl_name onde.click;
        #proxy_ssl_verify off;
        #proxy_set_header Host onde.click;

        proxy_hide_header Server;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin-api/ {
        # =========================================================================
        # [ 개발 환경 스위칭 설정 ] 두 옵션 중 하나만 주석 해제하여 사용하세요.
        # =========================================================================

        # [방법 A] 로컬 개발 전용 (로컬 도커 ADMIN 컨테이너로 연결)
        proxy_pass http://admin:8081/;

        # [방법 B] 원격 AWS 및 깃허브 제출용 (원격 AWS 개발 ALB로 연결)
        #proxy_pass https://onde-alb-207957013.ap-northeast-2.elb.amazonaws.com/;
        #proxy_ssl_server_name on;
        #proxy_ssl_name onde.click;
        #proxy_ssl_verify off;
        #proxy_set_header Host onde.click;

        proxy_hide_header Server;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin/login {
        return 404;
    }

    location ^~ /admin/ {
        return 404;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
