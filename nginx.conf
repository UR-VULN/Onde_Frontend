server {
    listen       80;
    server_name  localhost;

    # [보안 패치] Nginx 버전 정보 숨김
    server_tokens off;

    # [보안 패치] 전역 보안 헤더 설정
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http://localhost:9000 https://images.unsplash.com; font-src 'self' data: https://ka-f.fontawesome.com; connect-src 'self' http: https: ws: wss: http://localhost:9000 https://ka-f.fontawesome.com;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # [보안 패치] 숨김 파일 및 백업/설정 파일 강제 차단 (403 Forbidden)
    location ~* \.(env|zip|bak|sql|yml|yaml|ini|conf|tar|gz|swp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # [보안 패치] .git, .svn 등 숨김 디렉토리/파일 접근 차단
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # [보안 패치] robots.txt 직접 제공 (SPA 폴백 방지)
    location = /robots.txt {
        root /usr/share/nginx/html;
        access_log off;
        log_not_found off;
    }

    location /user-api/ {
        # ======================================================================
        # [ 개발 환경 스위칭 설정 ] 두 옵션 중 하나만 주석 해제하여 사용하세요.
        # ======================================================================
        
        # 📌 [방법 A] 로컬 개발 전용 (로컬 도커 API 컨테이너로 연결)
        # -> 로컬에서 백엔드 코드를 직접 수정하며 테스트하고 싶을 때 사용합니다.
        proxy_pass http://api:8080/;

        # 📌 [방법 B] 원격 AWS 및 깃허브 제출용 (원격 AWS 개발 ALB로 연결)
        # -> 로컬 백엔드를 켜지 않거나, 완성본을 깃허브(GitHub)에 올릴 때는 이 주석을 해제해 주세요.
        # proxy_pass https://onde-alb-207957013.ap-northeast-2.elb.amazonaws.com/;
        # proxy_ssl_server_name on;
        # proxy_ssl_name onde.click;
        # proxy_ssl_verify off;
        # proxy_set_header Host onde.click;      
        # # =========================================================================

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # [보안 패치] API 응답이 검색엔진에 인덱싱되는 것을 강제 차단
        add_header X-Robots-Tag "noindex, nofollow" always;

        # 상위 server 블록의 add_header가 무시되지 않도록 보안 헤더 복사 및 백엔드 헤더 숨김
        proxy_hide_header X-XSS-Protection;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http://localhost:9000 https://images.unsplash.com; font-src 'self' data: https://ka-f.fontawesome.com; connect-src 'self' http: https: ws: wss: http://localhost:9000 https://ka-f.fontawesome.com;" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location /admin-api/ {
        # =========================================================================
        # [ 개발 환경 스위칭 설정 ] 두 옵션 중 하나만 주석 해제하여 사용하세요.
        # =========================================================================
        
        # 📌 [방법 A] 로컬 개발 전용 (로컬 도커 ADMIN 컨테이너로 연결)
        # -> 로컬에서 백엔드 코드를 직접 수정하며 테스트하고 싶을 때 사용합니다.
        proxy_pass http://admin:8081/;

        # 📌 [방법 B] 원격 AWS 및 깃허브 제출용 (원격 AWS 개발 ALB로 연결)
        # -> 로컬 백엔드를 켜지 않거나, 완성본을 깃허브(GitHub)에 올릴 때는 이 주석을 해제해 주세요.
        # proxy_pass https://onde-alb-207957013.ap-northeast-2.elb.amazonaws.com/;
        # proxy_ssl_server_name on;
        # proxy_ssl_name onde.click;
        # proxy_ssl_verify off;
        # proxy_set_header Host onde.click;
        # # =========================================================================

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # [보안 패치] 관리자 API 응답이 검색엔진에 인덱싱되는 것을 강제 차단
        add_header X-Robots-Tag "noindex, nofollow" always;

        # 상위 server 블록의 add_header가 무시되지 않도록 보안 헤더 복사 및 백엔드 헤더 숨김
        proxy_hide_header X-XSS-Protection;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http://localhost:9000 https://images.unsplash.com; font-src 'self' data: https://ka-f.fontawesome.com; connect-src 'self' http: https: ws: wss: http://localhost:9000 https://ka-f.fontawesome.com;" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}

