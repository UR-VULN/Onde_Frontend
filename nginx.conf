server {
    listen       80;
    server_name  localhost;

    server_tokens off;

    # HSTS (HTTP Strict Transport Security): 브라우저에게 HTTPS로만 통신하라고 강제함
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Clickjacking 방어: 다른 해커 사이트의 <iframe> 안에 우리 사이트가 불려가는 것을 막음
    add_header X-Frame-Options SAMEORIGIN always;
    
    # MIME 스니핑 방어: 브라우저가 임의로 파일 형식을 추측해서 실행하는 것을 막음
    add_header X-Content-Type-Options nosniff always;
    
    # CSP (Content Security Policy): 허락되지 않은 외부 스크립트(XSS 공격) 실행을 원천 차단
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;" always;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /user-api/ {
        # ======================================================================
        # [ 개발 환경 스위칭 설정 ] 두 옵션 중 하나만 주석 해제하여 사용하세요.
        # ======================================================================
        
        # 📌 [방법 A] 로컬 개발 전용 (로컬 도커 API 컨테이너로 연결)
        # -> 로컬에서 백엔드 코드를 직접 수정하며 테스트하고 싶을 때 사용합니다.
        proxy_pass http://api:8080/;

        # 📌 [방법 B] 원격 AWS 및 깃허브 제출용 (원격 AWS 개발 ALB로 연결)
        # -> 로컬 백엔드를 켜지 않거나, 완성본을 깃허브(GitHub)에 올릴 때는 이 주석을 해제해 주세요.
        # proxy_pass https://onde-alb-207957013.ap-northeast-2.elb.amazonaws.com/;
        # proxy_ssl_server_name on;
        # proxy_ssl_name onde.click;
        # proxy_ssl_verify off;
        # proxy_set_header Host onde.click;      
        # # =========================================================================

        # proxy_set_header X-Real-IP $remote_addr;
        # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin-api/ {
        # =========================================================================
        # [ 개발 환경 스위칭 설정 ] 두 옵션 중 하나만 주석 해제하여 사용하세요.
        # =========================================================================
        
        # 📌 [방법 A] 로컬 개발 전용 (로컬 도커 ADMIN 컨테이너로 연결)
        # -> 로컬에서 백엔드 코드를 직접 수정하며 테스트하고 싶을 때 사용합니다.
        proxy_pass http://admin:8081/;

        # 📌 [방법 B] 원격 AWS 및 깃허브 제출용 (원격 AWS 개발 ALB로 연결)
        # -> 로컬 백엔드를 켜지 않거나, 완성본을 깃허브(GitHub)에 올릴 때는 이 주석을 해제해 주세요.
        # proxy_pass https://onde-alb-207957013.ap-northeast-2.elb.amazonaws.com/;
        # proxy_ssl_server_name on;
        # proxy_ssl_name onde.click;
        # proxy_ssl_verify off;
        # proxy_set_header Host onde.click;
        # # =========================================================================

        # proxy_set_header X-Real-IP $remote_addr;
        # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}

