server {
    listen       80;
    server_name  localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /oauth2/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /login/oauth2/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /user-api/ {
        # http -> https로 변경
        proxy_pass https://onde-alb-207957013.ap-northeast-2.elb.amazonaws.com/;
        
        # SSL 인증서 매칭을 위한 도메인 지정 및 검증 무시 설정 추가
        proxy_ssl_server_name on;
        proxy_ssl_name onde.click;
        proxy_ssl_verify off; # VPC 내부 통신이므로 SSL 검증은 무시해도 안전합니다.
        
        proxy_set_header Host onde.click; # 실제 인증서 도메인 전달
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin-api/ {
        # http -> https로 변경
        proxy_pass https://onde-alb-207957013.ap-northeast-2.elb.amazonaws.com/;
        
        # SSL 인증서 매칭을 위한 도메인 지정 및 검증 무시 설정 추가
        proxy_ssl_server_name on;
        proxy_ssl_name onde.click;
        proxy_ssl_verify off;
        
        proxy_set_header Host onde.click;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
